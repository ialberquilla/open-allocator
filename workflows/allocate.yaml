status: active
workflow: allocate
description: New-capital allocation flow from discovery through confirmed 1Tx execution and reconciliation.
stages:
  - stage: wallet_status
    skill: skills/discover.md
    command: wallet-status
    produces:
      - wallet-status-json
    review_focus:
      - wallet_identity
      - gas_readiness
    human_approval_default: false
  - stage: discover_universe
    skill: skills/discover.md
    command: list-vaults
    produces:
      - vault-universe-json
    review_focus:
      - dynamic_universe
      - unknown_fields
    human_approval_default: false
  - stage: score_candidates
    skill: skills/score.md
    command: score-vault
    produces:
      - vault-score-json
    review_focus:
      - scoring_factors
      - reward_dependence
      - liquidity
      - apy_descriptive
    human_approval_default: false
  - stage: screen_universe
    skill: skills/agentic-allocation.md
    command: screen
    produces:
      - screen-json
    review_focus:
      - dynamic_universe
      - reward_dependence
      - liquidity
      - unknown_fields
    human_approval_default: false
  - stage: build_allocation
    skill: skills/build-allocation.md
    command: build-allocation
    produces:
      - allocation-json
    review_focus:
      - policy_candidate_filter
      - allocation_concentration
    human_approval_default: false
  - stage: backtest_allocation
    skill: skills/agentic-allocation.md
    command: backtest
    produces:
      - backtest-json
    review_focus:
      - allocation_concentration
      - apy_descriptive
    human_approval_default: false
  - stage: simulate_and_risk_review
    skill: skills/meta/risk-review.md
    command: simulate
    produces:
      - simulation-json
      - advisory-risk-review
    review_focus:
      - concentration
      - reward_dependence
      - liquidity
      - apy_descriptive
    human_approval_default: false
  - stage: policy_gate
    skill: skills/build-allocation.md
    command: check-policy
    produces:
      - policy-result-json
    review_focus:
      - policy_conformance
    human_approval_default: false
  - stage: build_transaction_plan
    skill: skills/execute-with-1tx.md
    command: build-tx
    produces:
      - tx-plan-json
    review_focus:
      - tx_plan_parity
      - execution_announcement
      - gas_readiness
    human_approval_default: false
  - stage: execute_confirmed
    skill: skills/execute-with-1tx.md
    command: execute
    produces:
      - execution-report-json
      - checkpoint-json
      - allocation-log-jsonl
    review_focus:
      - human_confirmation
      - idempotency_resume
      - allocation_log
    human_approval_default: true
  - stage: reconcile_positions
    skill: skills/meta/checkpoint-protocol.md
    command: positions
    produces:
      - positions-json
      - reconciliation-notes
    review_focus:
      - positions_reconcile
      - checkpoint
    human_approval_default: false
