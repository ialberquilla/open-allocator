status: active
workflow: withdraw
description: Single-position exit flow using share-balance withdrawal math and confirmed 1Tx execution.
stages:
  - stage: snapshot_positions
    skill: skills/withdraw.md
    command: positions
    produces:
      - current-positions-json
    review_focus:
      - positions_reconcile
      - checkpoint
    human_approval_default: false
  - stage: plan_withdraw
    skill: skills/withdraw.md
    command: withdraw
    produces:
      - withdraw-dry-run-json
    review_focus:
      - share_balance_exit
      - withdrawal_constraints
      - liquidity
      - gas_readiness
    human_approval_default: false
  - stage: advisory_risk_review
    skill: skills/meta/risk-review.md
    command: withdraw
    produces:
      - advisory-risk-review
    review_focus:
      - liquidity
      - policy_conformance
      - apy_descriptive
    human_approval_default: false
  - stage: execute_withdraw_confirmed
    skill: skills/withdraw.md
    command: withdraw
    produces:
      - withdraw-execution-report-json
      - checkpoint-json
      - allocation-log-jsonl
    review_focus:
      - human_confirmation
      - idempotency_resume
      - allocation_log
    human_approval_default: true
  - stage: reconcile_positions
    skill: skills/meta/checkpoint-protocol.md
    command: positions
    produces:
      - post-withdraw-positions-json
      - reconciliation-notes
    review_focus:
      - positions_reconcile
      - checkpoint
    human_approval_default: false
